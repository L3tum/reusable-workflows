name: Publish To Forgejo

on:
  workflow_call:
    inputs:
      PACKAGE_TOKEN:
        description: 'Token for registry'
        required: true
        type: string

jobs:
  publish_forgejo:
    name: Publish to internal Forgejo registry
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive internal image coordinates
        id: image
        shell: bash
        env:
          SERVER_URL: ${{ github.server_url }}
          REPOSITORY: ${{ github.repository }}
          INTERNAL_REGISTRY: ${{ vars.INTERNAL_DOCKER_REGISTRY }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          # Internal registry host (strip scheme if provided)
          registry="$INTERNAL_REGISTRY"
          registry="${registry#https://}"
          registry="${registry#http://}"

          # For internal publishing, always use internal registry
          image="$registry/${REPOSITORY,,}"

          # Tag to publish for releases
          tag="$REF_NAME"
          if [ -n "${{ inputs.release_tag }}" ]; then
            tag="${{ inputs.release_tag }}"
          fi

          echo "registry=$registry" >> "$GITHUB_OUTPUT"
          echo "image=$image" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Build image (release + latest)
        shell: bash
        run: |
          set -euo pipefail
          image="${{ steps.image.outputs.image }}"
          tag="${{ steps.image.outputs.tag }}"

          docker build \
            -t "${image}:${tag}" \
            -t "${image}:latest" \
            .

      - name: Login to internal Forgejo registry
        shell: bash
        env:
          INTERNAL_REGISTRY: ${{ vars.INTERNAL_DOCKER_REGISTRY }}
          INTERNAL_USER: ${{ vars.INTERNAL_DOCKER_USERNAME }}
        run: |
          set -euo pipefail
          echo "${{ inputs.PACKAGE_TOKEN }}" | docker login "$INTERNAL_REGISTRY" -u "$INTERNAL_USER" --password-stdin

      - name: Push to internal Forgejo registry
        shell: bash
        run: |
          set -euo pipefail
          image="${{ steps.image.outputs.image }}"
          tag="${{ steps.image.outputs.tag }}"

          docker push "${image}:${tag}"
          docker push "${image}:latest"
