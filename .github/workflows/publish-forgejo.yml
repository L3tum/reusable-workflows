name: Publish To Forgejo

on:
  workflow_call:
    inputs:
      SUBDIRECTORY:
        description: "Subdirectory containing Dockerfile/build context"
        required: false
        type: string
        default: ""
      RELEASE_TAG:
        description: "Optional tag override"
        required: false
        type: string
        default: ""

jobs:
  publish_forgejo:
    name: Publish to internal Forgejo registry
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Derive internal image coordinates
        id: image
        shell: bash
        env:
          SERVER_URL: ${{ github.server_url }}
          REPOSITORY: ${{ github.repository }}
          INTERNAL_REGISTRY: ${{ vars.INTERNAL_DOCKER_REGISTRY }}
          REF_NAME: ${{ github.ref_name }}
          RELEASE_TAG: ${{ inputs.RELEASE_TAG }}
        run: |
          set -euo pipefail

          registry="$INTERNAL_REGISTRY"
          registry="${registry#https://}"
          registry="${registry#http://}"

          image="$registry/${REPOSITORY,,}"

          tag="$REF_NAME"
          if [ -n "$RELEASE_TAG" ]; then
            tag="$RELEASE_TAG"
          fi

          echo "registry=$registry" >> "$GITHUB_OUTPUT"
          echo "image=$image" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Derive docker build paths
        id: build
        shell: bash
        env:
          SUBDIRECTORY: ${{ inputs.SUBDIRECTORY }}
        run: |
          set -euo pipefail

          subdir="${SUBDIRECTORY#/}"
          subdir="${subdir%/}"

          if [ -z "$subdir" ]; then
            context="."
            dockerfile="./Dockerfile"
          else
            context="./$subdir"
            dockerfile="./$subdir/Dockerfile"
          fi

          echo "context=$context" >> "$GITHUB_OUTPUT"
          echo "dockerfile=$dockerfile" >> "$GITHUB_OUTPUT"

      - name: Build image (release + latest)
        shell: bash
        run: |
          set -euo pipefail
          image="${{ steps.image.outputs.image }}"
          tag="${{ steps.image.outputs.tag }}"
          context="${{ steps.build.outputs.context }}"
          dockerfile="${{ steps.build.outputs.dockerfile }}"

          docker build \
            --no-cache \
            -f "$dockerfile" \
            -t "${image}:${tag}" \
            -t "${image}:latest" \
            "$context"

      - name: Login to internal Forgejo registry
        shell: bash
        env:
          INTERNAL_REGISTRY: ${{ vars.INTERNAL_DOCKER_REGISTRY }}
          INTERNAL_USER: ${{ vars.INTERNAL_DOCKER_USERNAME }}
        run: |
          set -euo pipefail
          echo "${{ secrets.PACKAGE_TOKEN }}" | docker login "$INTERNAL_REGISTRY" -u "$INTERNAL_USER" --password-stdin

      - name: Push to internal Forgejo registry
        shell: bash
        run: |
          set -euo pipefail
          image="${{ steps.image.outputs.image }}"
          tag="${{ steps.image.outputs.tag }}"

          docker push "${image}:${tag}"
          docker push "${image}:latest"